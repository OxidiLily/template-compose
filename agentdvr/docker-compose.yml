services:
  agentdvr:
    image: mekayelanik/ispyagentdvr:latest
    restart: unless-stopped
    ports:
      - "8090:8090"        # UI
      - "3478:3478/tcp"   # STUN/TURN
      - "3478:3478/udp"
      - "50000-50010:50000-50010/udp" # WebRTC range (kecilkan range agar Dokploy lancar)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - AGENTDVR_WEBUI_PORT=8090
      - AGENTDVR_IP_RANGE=100.64.0.0/10
    volumes:
      - /media/video/cctv/agentdvr-config:/AgentDVR/Media/XML/
      - /media/video/cctv/agentdvr-commands:/AgentDVR/Commands/
      - /media/video/cctv/agentdvr-media:/AgentDVR/Media/WebServerRoot/Media/   # ← ke folder Jellyfin

volumes:
  agentdvr-config: {}
  agentdvr-commands: {}


